/* ===== Arcade Tier Progress ===== */
.tier-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 22px;
    padding: 22px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    transition: 0.3s ease;
    font-family: &#39;Google Sans&#39;, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center; /* Ensures content inside is centered */
}

.tier-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}

.tier-header {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 10px 0;
    color: white;
    font-weight: 600;
}

/* NEW CSS TO FIX STAR SIZES AND TIER IMAGES */
.stars {
    display: flex;
    justify-content: center;
    gap: 4px;
    height: 20px;
    margin-bottom: 8px;
}

.stars img {
    width: 20px !important; /* Forces stars to be small */
    height: 20px !important;
    object-fit: contain;
}

.tier-img {
    width: 120px !important; /* Restricts the big tier badges */
    height: 120px !important;
    object-fit: contain;
    margin: 10px 0;
}

.divider-line {
    width: 100%;
    height: auto;
}

/* PROGRESS BAR FIXES */
.progress-container {
    width: 100%;
    height: 20px;
    background: rgba(255,255,255,0.12);
    border-radius: 50px;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

.progress-fill {
    height: 100%;
    border-radius: 50px;
    position: absolute;
    left: 0;
    top: 0;
    animation: loadBar 2s ease;
    width: 0%; /* Default width, updated via JS */
    z-index: 1;
    transition: width 1s ease-in-out;
}

.tier-percent-text {
    font-family: &#39;Google Sans&#39;, sans-serif;
    font-size: 11px;
    font-weight: bold;
    color: white;
    z-index: 2; /* Ensures text is over the progress bar */
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    position: absolute;
}

.progress-fill::after {
    content: &#39;&#39;;
    position: absolute;
    top: 0;
    left: -40%;
    width: 40%;
    height: 100%;
    background: rgba(255,255,255,0.45);
    transform: skewX(-25deg);
    animation: shine 2.8s infinite;
}

/* Individual Colors */
.silver-fill {
    background: #ea4335;
    box-shadow: 0 0 15px #ffffff;
}

.gold-fill {
    background: #4285f4;
    box-shadow: 0 0 18px #ffca28;
}

.diamond-fill {
    background: #fbbc04;
    box-shadow: 0 0 20px #7c4dff;
}

.platinium-fill {
    background: #34a853;
    box-shadow: 0 0 20px #7c4dff;
}

.tier-points {
    color: #ddd;
    margin-top: 12px;
    font-size: 13px;
    text-align: center;
    font-family: &#39;Google Sans&#39;, sans-serif;
}

/* Animations */
@keyframes loadBar {
    from { width: 0; }
}

@keyframes shine {
    0% { left: -40%; }
    100% { left: 120%; }
}

/* Mobile */
@media(max-width:768px) {
    .tier-card {
        padding: 18px;

    justify-content: center;

    &lt;div style=&quot;background-color: #19283C;&quot;&gt;
        &lt;section&gt;
          &lt;h2 id=&quot;card-title&quot; class=&quot;faq-header&quot;&gt;Frequently Asked Questions&lt;/h2&gt;
          &lt;input type=&quot;text&quot; id=&quot;search&quot; placeholder=&quot;search&quot; name=&quot;search&quot; class=&quot;input-faq&quot;&gt;
          &lt;div class=&quot;faqSection&quot;&gt;
          &lt;div id=&quot;faq&quot;&gt;&lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;How many points will I get when I complete a skill badge?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;After you complete 2 skill badges you are eligible to earn 1 Arcade point. For every
                  6 skills badges you will get 3 Arcade points and so on...&lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;I have earned only 1 skill badges. How many points will I get?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;Unfortunately, earning 1 skill badges will not be enough to claim an Arcade point.
                  You will need to complete at least 2 Skill Badges to earn one point.&lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;Will I receive any swags or physical certificates for the games?
                &lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;Users will get a special badge for each game they complete in this
                  event and for each badge earned user will also receive 1 Arcade point which in turn will
                  be used to redeem goodies when the prize counter opens. Please note there won’t be any physical
                  certificates or goodies just for completing the game.
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;Are there prizes? What are the prizes?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;Yes! The more badges you earn, the more arcade points you accumulate. Redeem points for prizes at the prize counter. The prize counter will be open at the end of the year.&lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;Do I get a prize as soon as I earn a badge?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;No. You will not be able to claim a prize immediately. You&#39;ll be able
                  to claim prizes when the prize counter opens.
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;When does the prize counter open?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;Great question. The prize counter dates would be announced soon. Stay
                  tuned for exact dates.
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;What do I have to do to get a prize?
                &lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;Activate the Arcade for your account. Then join games, complete labs,
                  learn skills, and earn badges! Each challenge consists of multiple labs. Complete all
                  the labs successfully to earn the badge. Each badge gets you one point. Periodically,
                  the prize counter will open and you&#39;ll be able to use points to claim swag.
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;How will I know when the prize counter opens?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;There are many ways to stay up to date. Add us to your calendar. 
                    Keep an eye on your email. And, follow us on &lt;a style=&quot;color:#1e8e3e&quot;
                    href=&quot;https://discuss.google.dev/t/have-you-subscribed-to-the-skills-boost-arcade/244682?utm_source=googleskills&amp;utm_medium=gametemplate&amp;utm_campaign=arcade25-december-gccforum&quot;&gt;our Google Developer Program Forum &lt;/a&gt;
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;How do arcade points work?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt; One point per eligible game/trivia badge. All eligible game/trivia badges are listed
                  on this
                  page. If it&#39;s not listed here, it&#39;s not eligible. Points expire after 6 months. You&#39;ll
                  have at least one opportunity to redeem points, so please use it, don&#39;t lose it!
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;How do I know how many arcade points I have?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt; Compare the list of eligible arcade games to &lt;a style=&quot;color:#1e8e3e&quot;
                    href=&quot;https://support.google.com/qwiklabs/answer/9222527&quot;&gt;your
                    Google Skills profile &lt;/a&gt; to calculate points.
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;How can I get more arcade points?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt; Play more games! The more you learn, the more you earn.&lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;What are the upcoming arcade games?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt; Keep an eye on this page for current and upcoming games.&lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;I don&#39;t want a prize. Can I still play?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;Yes! When the prize counter opens, participation is totally optional.
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;What is the cost? Do I need quarters?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;There is no cost to participate in Arcade games. No quarters needed!
                  (Or any other currency!)
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;Can I participate if I&#39;m already in another Google program? (Ex:
                  Innovators, education programs, Learn to Earn, OnAir, Study Jams, DevFest)
                &lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;Yes! Please keep in mind that different programs have varying
                  requirements so check with other programs as well.
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;Can I participate if I&#39;m located in [your country of residence,
                  whatever that may be]?
                &lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;Yes, you may participate within the Google Skills Terms
                  of Service!
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;What about sending prizes to [your country of residence, whatever
                  that may be]?
                &lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;We make every effort to reach you wherever you are, whenever
                  possible. Items cannot be shipped to countries on the list of&lt;a style=&quot;color:#1e8e3e&quot;
                    href=&quot;https://home.treasury.gov/policy-issues/financial-sanctions/sanctions-programs-and-country-information&quot;&gt;
                    US Treasury Department’s Sanctions Programs &lt;/a&gt; and the following countries:
                  Pakistan, Bangladesh, Iraq, Iran, North Korea, Crimea, Cuba, Sevastopol city and Syria.
                  Each challenge includes details about prizes and shipping availability, as this list may
                  change at any time (locations may be added or removed based on unforeseen events). If
                  you’re in one of these countries, you are welcome to participate within the Terms of
                  Service. You may decline a prize, select an address in a country where shipping is
                  available.
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;

                  Google Skills platform.
                &lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;faq&quot;&gt;
              &lt;div class=&quot;question&quot;&gt;
                &lt;h3 class=&quot;question-text&quot;&gt;What if there are no more seats in a game?&lt;/h3&gt;
              &lt;/div&gt;
              &lt;div class=&quot;answer&quot;&gt;
                &lt;p class=&quot;answer-text&quot;&gt;That happens sometimes! Seats are available on a first come, first

                  opportunities to join if you miss the first round.
                &lt;/p&gt;
              &lt;/div&gt;

            &lt;div class=&quot;question&quot;&gt;
              &lt;h3 class=&quot;question-text&quot;&gt;How does Google Skills Arcade ensure a safe and supportive community?&lt;/h3&gt;

            &lt;div class=&quot;answer&quot;&gt;

          &lt;/div&gt;
          &lt;div class=&quot;answer&quot;&gt;

    &lt;div class=&quot;faq&quot;&gt;
    &lt;div class=&quot;question&quot;&gt;
      &lt;h3 class=&quot;question-text&quot;&gt;How does Google Skills Arcade handle violations of its policies?
    &lt;/h3&gt;

    &lt;div class=&quot;answer&quot;&gt;

                &lt;div class=&quot;answer&quot;&gt;
                  &lt;p class=&quot;answer-text&quot;&gt;Yes! They are completely different. The milestones in the Arcade Facilitator program are different from the Arcade Player achievements.&lt;/p&gt;
                    &lt;p class=&quot;answer-text&quot;&gt;Note that, under the facilitator program, you mainly earn &lt;strong&gt;&quot;Bonus&quot; points &lt;/strong&gt; when you complete a milestone and you earn &lt;stong&gt;&quot;Arcade&quot; points&lt;/strong&gt; according to the Google Skills Arcade points system.
                    Thus you can &lt;strong&gt;accumulate the Bonus points earned in the facilitator program and add that to your actual Arcade points to reach any of the mentioned player achievements &lt;/strong&gt; and receive swags for that particular swag tier at the end of an Arcade season.

    &lt;script type=&quot;text/javascript&quot; src=&quot;//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit&quot;&gt;&lt;/script&gt;

    &lt;script&gt;
        // Google Translate Initialization
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({ pageLanguage: &#39;en&#39; }, &#39;google_translate_element&#39;);
        }

        // DOMContentLoaded block for FAQ, Footer Hiding, and Smooth Scroll
        document.addEventListener(&quot;DOMContentLoaded&quot;, function () {
            
            // Dynamic Tier Progress Calculation
            const tierCards = document.querySelectorAll(&#39;.tier-section .tier-card&#39;);
            tierCards.forEach(card =&gt; {
                const pointsElement = card.querySelector(&#39;.tier-points&#39;);
                const fillElement = card.querySelector(&#39;.progress-fill&#39;);
                const percentTextElement = card.querySelector(&#39;.tier-percent-text&#39;);
                
                if(pointsElement &amp;&amp; fillElement &amp;&amp; percentTextElement) {
                    // Match the numbers in the format &quot;18/1000 slots left&quot;
                    const text = pointsElement.textContent.trim();
                    const match = text.match(/(\d+)\s*\/\s*(\d+)/);
                    
                    if(match) {
                        const remaining = parseInt(match[1], 10);
                        const total = parseInt(match[2], 10);
                        
                        let percentFilled = 0;
                        if(total &gt; 0) {
                            // Automatically calculate what percentage is filled
                            percentFilled = ((total - remaining) / total) * 100;
                        }
                        
                        // Bound the percentage between 0 and 100
                        percentFilled = Math.max(0, Math.min(100, percentFilled));
                        
                        // Apply calculated styles
                        fillElement.style.width = percentFilled + &#39;%&#39;;
                        percentTextElement.textContent = Math.round(percentFilled) + &#39;%&#39;;
                    }
                }
            });


            const faqs = document.querySelectorAll(&#39;.faq&#39;);
            const searchInput = document.getElementById(&#39;search&#39;);

            faqs.forEach(faq =&gt; {
                faq.addEventListener(&quot;click&quot;, () =&gt; {
                    faq.classList.toggle(&quot;active&quot;);
                    const answer = faq.querySelector(&#39;.answer&#39;);
                    answer.style.maxHeight = faq.classList.contains(&#39;active&#39;) ? answer.scrollHeight + &quot;px&quot; : null;
                });
            });

            searchInput.addEventListener(&quot;keyup&quot;, function (event) {
                let searchString = event.target.value.toLowerCase();
                faqs.forEach(item =&gt; {
                    const questionText = item.querySelector(&#39;.question-text&#39;).textContent.toLowerCase();
                    const answerText = item.querySelector(&#39;.answer-text&#39;).textContent.toLowerCase();
                    item.style.display = (questionText.includes(searchString) || answerText.includes(searchString)) ? &quot;&quot; : &quot;none&quot;;
                });
            });
            
            function hideFooter() {
                const footer = document.querySelector(&#39;div[jsname=&quot;sMTyfe&quot;]&#39;);
                if (footer) footer.style.display = &quot;none&quot;;
            }
            hideFooter();
            const footerCheckInterval = setInterval(hideFooter, 500);
            setTimeout(() =&gt; clearInterval(footerCheckInterval), 10000);

            $(&#39;a[href^=&quot;#&quot;]:not(.dropdown-toggle)&#39;).on(&#39;click&#39;, function (event) {
                var target = $(this.getAttribute(&#39;href&#39;));
                if (target.length) {
                    event.preventDefault();
                    $(&#39;html, body&#39;).animate({ scrollTop: target.offset().top - 70 }, 500);
                }
            });
        });
    &lt;/script&gt;

&lt;script&gt;
    (function() {
        // Find all elements marked for shuffling
        const items = document.querySelectorAll(&#39;.shuffle-item&#39;);
        
        // Identify all unique parent containers (Rows)
        const parents = new Set();
        items.forEach(item =&gt; parents.add(item.parentElement));

        // Shuffle items inside each parent individually
        parents.forEach(parent =&gt; {
            // Only shuffle direct children that have the class
            const children = Array.from(parent.children).filter(child =&gt; 
                child.classList.contains(&#39;shuffle-item&#39;)
            );

            if (children.length &gt; 1) {
                // Fisher-Yates Shuffle
                for (let i = children.length - 1; i &gt; 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    // Move the randomly selected child to the end
                    parent.appendChild(children[j]);
                }
            }
        });
    })();
&lt;/script&gt;

&lt;script&gt;
    (function() {
        // This script finds every parent of a &#39;.shuffle-item&#39; and shuffles its children
        const items = document.querySelectorAll(&#39;.shuffle-item&#39;);
        const parents = new Set();
        items.forEach(item =&gt; parents.add(item.parentElement));

        parents.forEach(parent =&gt; {
            const children = Array.from(parent.children).filter(child =&gt; 
                child.classList.contains(&#39;shuffle-item&#39;)
            );

            if (children.length &gt; 1) {
                // Randomly re-append children to shuffle them
                for (let i = children.length - 1; i &gt; 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    parent.appendChild(children[j]);
                }
            }
        });
    })();
&lt;/script&gt;

&lt;script&gt;
    let currentPos = 0;
    const sliderTrack = document.querySelector(&quot;.slides-container&quot;);
    const totalSlidesCount = document.querySelectorAll(&quot;.slide-item&quot;).length;
    const dotsWrapper = document.querySelector(&quot;.dots&quot;);

    // Generate Dots
    for (let i = 0; i &lt; totalSlidesCount; i++) {
        let d = document.createElement(&quot;span&quot;);
        d.className = i === 0 ? &quot;dot active&quot; : &quot;dot&quot;;
        d.addEventListener(&quot;click&quot;, () =&gt; gotoSlide(i));
        dotsWrapper.appendChild(d);
    }

    function gotoSlide(n) {
        currentPos = (n + totalSlidesCount) % totalSlidesCount;
        sliderTrack.style.transform = `translateX(-${currentPos * 100}%)`;
        
        document.querySelectorAll(&quot;.dot&quot;).forEach((dot, idx) =&gt; {
            dot.classList.toggle(&quot;active&quot;, idx === currentPos);
        });
    }

    document.querySelector(&quot;.prev&quot;)?.addEventListener(&quot;click&quot;, () =&gt; gotoSlide(currentPos - 1));
    document.querySelector(&quot;.next&quot;)?.addEventListener(&quot;click&quot;, () =&gt; gotoSlide(currentPos + 1));
&lt;/script&gt;
